<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DriveNow Marketplace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="top-nav">
      <div class="brand">DriveNow</div>
      <nav>
        <a href="#/">Home</a>
        <a href="#/inventory">Inventory</a>
      </nav>
      <div class="header-actions">
        <button id="theme-toggle" class="ghost-btn" aria-label="Toggle theme">🌙</button>
      </div>
    </header>

    <main id="app"></main>

    <div class="chat-widget" id="chat-widget">
      <button id="chat-toggle" class="chat-toggle">💬 Live Chat</button>
      <div id="chat-box" class="chat-box hidden">
        <h4>Support</h4>
        <p>Hi there! Need help choosing a vehicle?</p>
        <input type="text" placeholder="Type a message..." disabled />
        <small>Demo widget (non-functional)</small>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
